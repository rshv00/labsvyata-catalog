name: Deploy catalog to Azure Function App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository settings
        run: |
          if [ -z "${{ vars.AZURE_FUNCTIONAPP_NAME }}" ]; then
            echo "::error::Missing repository variable AZURE_FUNCTIONAPP_NAME"
            exit 1
          fi

          if [ -z "${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" ]; then
            echo "::error::Missing repository secret AZURE_FUNCTIONAPP_PUBLISH_PROFILE"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Build static catalog
        run: npm run build

      - name: Copy static output to Azure host
        run: |
          rm -rf azure-function-host/out
          mkdir -p azure-function-host/out
          rsync -a --delete out/ azure-function-host/out/

      - name: Install Azure host dependencies
        working-directory: azure-function-host
        run: npm ci --omit=dev

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: azure-function-host
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
